image: python:3.12

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

cache:
  paths:
    - .cache/pip

stages:
  - test

test:
  stage: test
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest -q
